<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TWo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
.hidden{
    display:none;
}
</style>

</head>

<body class="p-5">

<div class="container text-center">

<button class="btn btn-primary" onclick="toggleContent()">
Show And Hideen Content
</button>

<div id="content" class="mt-4 hidden">
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quia illo aliquam facere velit animi sunt tenetur et, ipsum pariatur blanditiis fugiat reiciendis 
        cupiditate saepe ea quod dolorem iure dolorum inventore.</p>
</div>

</div>

<script>

function toggleContent(){
    document.getElementById("content").classList.toggle("hidden");
}

</script>

</body>
</html>
