<!DOCTYPE html>
<html>

<head>
    <title>Custom Font Example</title>


    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f4f4f4;
        }

        .custom-text {
            font-family: 'Poppins', sans-serif;
            font-size: 20px;
            font-weight: 500;
            color: #333;
            width: 60%;
            margin: 40px auto;
            text-align: center;
        }
    </style>
</head>

<body>

    <p class="custom-text">
        This paragraph uses a custom web font from Google Fonts.
        It is not a default browser font.
    </p>

</body>

</html>
