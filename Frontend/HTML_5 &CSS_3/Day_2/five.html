<!DOCTYPE html>
<html>
<head>
    <title>Photo Gallery</title>
<style>
   body {
    margin: 0;
    font-family: Arial, sans-serif;
}

.gallery {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 40px;
}


.image-box {
    overflow: hidden; 
}


.image-box img {
    width: 300px;
    height: 200px;
    transition: transform 0.5s ease;   
}

.image-box img:hover {
    transform: scale(0.8);  
}
 
</style>
</head>
<body>

    <div class="gallery">
        <div class="image-box">
            <img src="https://picsum.photos/id/1015/400/250">
        </div>

        <div class="image-box">
            <img src="https://picsum.photos/id/1016/400/250">
        </div>

        <div class="image-box">
            <img src="https://picsum.photos/id/1018/400/250">
        </div>

        <div class="image-box">
            <img src="https://picsum.photos/id/1020/400/250">
        </div>
    </div>

</body>
</html>
