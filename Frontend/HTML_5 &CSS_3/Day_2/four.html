<!DOCTYPE html>
<html>
<head>
    <title>Vertical Name</title>
<style>
    body {
    margin: 0;
}

.side-bar {
    background-color: green;
    height: 100vh;        
    width: 120px;
    position: fixed;
    left: 0;
    top: 0;

    display: flex;
    justify-content: center;
    align-items: center;
}

.name {
    color: white;
    font-size: 28px;
    font-weight: bold;

    transform: rotate(-90deg);   
}

</style>
</head>
<body>

    <div class="side-bar">     
        <div class="name">      
            Hossam
        </div>
    </div>

</body>
</html>
