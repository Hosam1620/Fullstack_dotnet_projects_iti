<!DOCTYPE html>
<html>
<head>
    <title>Canvas Image Task</title>
</head>
<body>

<canvas id="myCanvas" width="400" height="400"
        style="border:1px solid black;"></canvas>

<script>

const canvas = document.getElementById("myCanvas");
const ctx = canvas.getContext("2d");

// Load Images
const sadImg = new Image();
const smileImg = new Image();

sadImg.src = "sad.png";
smileImg.src = "smiley.png";

// Draw Image Function
function drawImage(img, scale = 1) {

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    let width = 300 * scale;
    let height = 300 * scale;

    let x = (canvas.width - width) / 2;
    let y = (canvas.height - height) / 2;

    ctx.drawImage(img, x, y, width, height);
}

// When page loads → show sad face
window.onload = function () {
    sadImg.onload = function () {
        drawImage(sadImg);
    };
};

// Mouse Down → Smile + Bigger
canvas.onmousedown = function () {
    drawImage(smileImg, 1.2);
};

// Mouse Up → Sad Normal
canvas.onmouseup = function () {
    drawImage(sadImg, 1);
};

</script>

</body>
</html>
